# Tool Guard 风险等级配置
# LOW    : 纯 Python 执行，无外部进程，直接运行
# MEDIUM : 有外部 I/O 或写操作，记录日志后执行
# HIGH   : 启动子进程 / shell 命令，暂停等待用户确认 (HITL)

tools:
  bandit_scan:
    risk_level: HIGH
    reason: "启动子进程执行 `python -m bandit`，属于 shell 命令调用"

  semgrep_scan:
    risk_level: HIGH
    reason: "启动 semgrep 子进程进行多语言静态分析，属于 shell 命令调用"

  ruff_check:
    risk_level: HIGH
    reason: "启动 ruff 子进程进行 Python lint 分析，属于 shell 命令调用"

  scan_secrets:
    risk_level: LOW
    reason: "纯 Python 正则扫描 diff 文本，无外部进程"

  scan_sql_injection:
    risk_level: LOW
    reason: "纯 Python 正则扫描 diff 文本，无外部进程"

  ast_analyze:
    risk_level: LOW
    reason: "纯 Python AST 解析，无外部进程"

  write_file:
    risk_level: MEDIUM
    reason: "写入或修改本地文件"

  post_github_comment:
    risk_level: MEDIUM
    reason: "向 GitHub PR 发布评论"

  run_shell_command:
    risk_level: HIGH
    reason: "执行任意 shell 命令"

  run_in_docker:
    risk_level: HIGH
    reason: "在 Docker 容器内执行命令"
